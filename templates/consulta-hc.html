<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Historias Clínicas - FHIR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .search-section {
            padding: 2rem;
            background: #f7fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            max-width: 600px;
        }

        .search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-search {
            background: #667eea;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-search:hover {
            background: #5568d3;
        }

        .content {
            padding: 2rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            font-size: 2.5rem;
            opacity: 0.9;
        }

        .stat-info h3 {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-info p {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .patients-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .patients-table thead {
            background: #f7fafc;
        }

        .patients-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        .patients-table td {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .patients-table tbody tr {
            transition: background 0.2s ease;
        }

        .patients-table tbody tr:hover {
            background: #f7fafc;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-male {
            background: #bee3f8;
            color: #2c5282;
        }

        .badge-female {
            background: #fed7e2;
            color: #97266d;
        }

        .badge-other {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-view {
            background: #667eea;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-view:hover {
            background: #5568d3;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            display: none;
        }

        .empty-state.show {
            display: block;
        }

        .empty-state i {
            font-size: 4rem;
            color: #cbd5e0;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            color: #4a5568;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #718096;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .pagination button {
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .pagination button:hover:not(:disabled) {
            background: #f7fafc;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="ph ph-folder-open"></i>
                Consulta de Historias Clínicas
            </h1>
            <div class="header-actions">
                <a href="/" class="btn btn-primary">
                    <i class="ph ph-house"></i>
                    Dashboard
                </a>
                <a href="/registro-paciente" class="btn btn-primary">
                    <i class="ph ph-plus-circle"></i>
                    Nuevo Paciente
                </a>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar por documento o nombre...">
                <button class="btn-search" onclick="searchPatients()">
                    <i class="ph ph-magnifying-glass"></i>
                    Buscar
                </button>
            </div>
        </div>

        <div class="content">
            <div id="alert" class="alert"></div>

            <div class="stats">
                <div class="stat-card">
                    <i class="ph ph-users stat-icon"></i>
                    <div class="stat-info">
                        <h3 id="totalPatients">0</h3>
                        <p>Total Pacientes</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="ph ph-calendar stat-icon"></i>
                    <div class="stat-info">
                        <h3 id="todayPatients">0</h3>
                        <p>Registrados Hoy</p>
                    </div>
                </div>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Cargando historias clínicas...</p>
            </div>

            <div id="emptyState" class="empty-state">
                <i class="ph ph-folder-notch-open"></i>
                <h3>No hay pacientes registrados</h3>
                <p>Comienza registrando tu primer paciente</p>
            </div>

            <div id="patientsContainer" style="display: none;">
                <table class="patients-table">
                    <thead>
                        <tr>
                            <th>ID FHIR</th>
                            <th>Documento</th>
                            <th>Nombre Completo</th>
                            <th>Sexo</th>
                            <th>Fecha Nacimiento</th>
                            <th>Edad</th>
                            <th>Municipio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="patientsTableBody">
                    </tbody>
                </table>

                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let allPatients = [];

        // Cargar pacientes al iniciar
        window.addEventListener('DOMContentLoaded', () => {
            loadPatients();
        });

        // Buscar con Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchPatients();
            }
        });

        async function loadPatients(page = 1) {
            showLoading();

            try {
                const response = await fetch(`/api/v1/fhir/patients?page=${page}&size=10`);
                const data = await response.json();

                if (response.ok) {
                    allPatients = data.patients || [];
                    totalPages = data.total_pages || 1;
                    currentPage = page;

                    updateStats(data.total || 0);
                    renderPatients(allPatients);
                    renderPagination();
                } else {
                    showError('Error al cargar pacientes: ' + (data.detail || 'Error desconocido'));
                }
            } catch (error) {
                showError('Error de conexión: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        async function searchPatients() {
            const query = document.getElementById('searchInput').value.trim();

            if (!query) {
                loadPatients();
                return;
            }

            showLoading();

            try {
                const response = await fetch(`/api/v1/fhir/patients/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (response.ok) {
                    allPatients = data.patients || [];
                    updateStats(data.total || 0);
                    renderPatients(allPatients);
                    document.getElementById('pagination').style.display = 'none';
                } else {
                    showError('Error en la búsqueda: ' + (data.detail || 'Error desconocido'));
                }
            } catch (error) {
                showError('Error de conexión: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        function renderPatients(patients) {
            const tbody = document.getElementById('patientsTableBody');
            const container = document.getElementById('patientsContainer');
            const emptyState = document.getElementById('emptyState');

            if (!patients || patients.length === 0) {
                container.style.display = 'none';
                emptyState.classList.add('show');
                return;
            }

            emptyState.classList.remove('show');
            container.style.display = 'block';

            tbody.innerHTML = patients.map(patient => {
                const identifier = patient.identifier?.[0]?.value || 'N/A';
                const name = patient.name?.[0]?.text || 'Sin nombre';
                const gender = patient.gender || 'unknown';
                const birthDate = patient.birthDate || 'N/A';
                const age = calculateAge(birthDate);
                const city = patient.address?.[0]?.city || 'N/A';
                const id = patient.id;

                const genderBadge = {
                    'male': '<span class="badge badge-male">Masculino</span>',
                    'female': '<span class="badge badge-female">Femenino</span>',
                    'other': '<span class="badge badge-other">Otro</span>',
                    'unknown': '<span class="badge badge-other">No especificado</span>'
                }[gender];

                return `
                    <tr>
                        <td><strong>${id}</strong></td>
                        <td>${identifier}</td>
                        <td>${name}</td>
                        <td>${genderBadge}</td>
                        <td>${birthDate}</td>
                        <td>${age} años</td>
                        <td>${city}</td>
                        <td>
                            <a href="/paciente/${id}" class="btn-view">
                                <i class="ph ph-eye"></i>
                                Ver Detalle
                            </a>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';

            let html = `
                <button onclick="loadPatients(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="ph ph-caret-left"></i> Anterior
                </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                html += `
                    <button 
                        onclick="loadPatients(${i})" 
                        class="${i === currentPage ? 'active' : ''}"
                    >
                        ${i}
                    </button>
                `;
            }

            html += `
                <button onclick="loadPatients(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    Siguiente <i class="ph ph-caret-right"></i>
                </button>
            `;

            pagination.innerHTML = html;
        }

        function updateStats(total) {
            document.getElementById('totalPatients').textContent = total;
            // Por ahora, "hoy" será 0 (se puede implementar después)
            document.getElementById('todayPatients').textContent = '0';
        }

        function calculateAge(birthDate) {
            if (!birthDate || birthDate === 'N/A') return 'N/A';

            const birth = new Date(birthDate);
            const today = new Date();
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();

            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }

            return age;
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
            document.getElementById('patientsContainer').style.display = 'none';
            document.getElementById('emptyState').classList.remove('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function showError(message) {
            const alert = document.getElementById('alert');
            alert.className = 'alert error show';
            alert.textContent = message;

            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }
    </script>
</body>

</html>
